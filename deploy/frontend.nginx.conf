server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the RCA API to the backend service.
    location /health { proxy_pass http://rca-server:8000; }
    location /cases  { proxy_pass http://rca-server:8000; }
    location /rca/   {
        proxy_pass http://rca-server:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;           # crucial for SSE streaming
        proxy_read_timeout 1h;
        proxy_cache off;
    }
}
